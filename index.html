<meta http-equiv="refresh" content="0; url=resume.html">

<button onclick="toggleMusic()">🎵 播放 / 暫停音樂</button>

<audio id="bgm" loop>
  <source src="WANTCHU - keshi (youtube)" type="audio/mpeg">
</audio>

<script>
let playing = false;

function toggleMusic() {
  const bgm = document.getElementById("bgm");

  if (playing) {
    bgm.pause();
  } else {
    bgm.play();
  }

  playing = !playing;
}
</script>
